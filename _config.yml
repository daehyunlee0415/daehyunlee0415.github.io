# Welcome to Jekyll!
#
# This config file is meant for settings that affect your whole blog, values
# which you are expected to set up once and rarely need to edit after that.
# For technical reasons, this file is *NOT* reloaded automatically when you use
# 'jekyll serve'. If you change this file, please restart the server process.

# Site settings
title: Dae Hyun Lee
email: dhlee4 at uw.edu
description: > # this means to ignore newlines until "baseurl:"
  I am Dae Hyun Lee, an MLE at Apple and a former Ph.D. student in Biomedical and Health Informatics at the University of Washington. I am passionate about understanding new things, building practical systems, and applying interpretable machine learning to clinical data to predict adverse events and discover better care pathways.
baseurl: "" # the subpath of your site, e.g. /blog
url: "https://dhlee4.github.io" # the base hostname & protocol for your site
github_username: dhlee4

# Build settings
markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter: rouge

# Bundled with github-pages; keep Atom feed here so the hand-written RSS at feed.xml stays valid.
feed:
  path: atom.xml

# Helps jekyll-github-metadata (from github-pages) when building locally
repository: dhlee4/dhlee4.github.io

defaults:
  - scope:
      path: ""
      type: posts
    values:
      ai_disclaimer: true
